<!DOCTYPE html>
<html>
<head>
    <title>Dungeon Keeper</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOP NAV BAR -->
<div class="topbar">

    <div class="tab active" onclick="showScreen('overview')">
        Overview
    </div>

    <div class="tab" onclick="showScreen('dungeon')">
        Dungeon
    </div>

    <div class="tab" onclick="showScreen('research')">
        Research
    </div>

    <div class="tab" onclick="showScreen('world')">
        World
    </div>

</div>

<!-- MAIN LAYOUT -->
<div class="layout">

    <!-- LEFT SIDEBAR -->
    <div class="sidebar">

        <h2>Resources</h2>

        <div class="resource">
            Food: <span id="food">0</span>
        </div>

        <div class="resource">
            Wood: <span id="wood">0</span>
        </div>

        <div class="resource">
            Stone: <span id="stone">0</span>
        </div>

        <hr>

        <h3>Dungeon Stats</h3>

        <div class="resource">
            Nests: <span id="nestCount">0</span>
        </div>

    </div>

    <!-- MAIN CONTENT -->
    <div class="main">

        <div class="version">v0.03</div>
        <!-- OVERVIEW -->
        <div class="screen" id="screen-overview">

            <h1>Dungeon Keeper</h1>

            <p>Build your dungeon, expand your species, survive the world.</p>

            <hr>

            <h2>Actions</h2>

            <button onclick="gatherFood()">Gather Food</button>
            <button onclick="gatherWood()">Gather Wood</button>
            <button onclick="gatherStone()">Gather Stone</button>

        </div>

        <!-- DUNGEON -->
        <div class="screen" id="screen-dungeon">

            <h1>Dungeon</h1>

            <h2>Rooms</h2>

            <div class="resource">
                Nest (Cost: 10 Wood, 5 Stone)
                <button onclick="buildNest()">Build</button>
            </div>

        </div>

        <!-- RESEARCH -->
        <div class="screen" id="screen-research">

            <h1>Research</h1>

            <p>Coming soon...</p>

        </div>

        <!-- WORLD -->
        <div class="screen" id="screen-world">

            <h1>World</h1>

            <p>Coming soon...</p>

        </div>

    </div>

</div>

<!-- SCRIPTS -->
<script src="data/resources.js"></script>
<script src="data/rooms.js"></script>
<script src="data/monsters.js"></script>
<script src="data/research.js"></script>

<script src="save.js"></script>
<script src="game.js"></script>

</body>
</html>
